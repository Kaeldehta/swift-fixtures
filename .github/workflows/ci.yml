name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app
      - name: Run tests
        run: swift test
      - name: Run tests (all traits)
        run: swift test --enable-all-traits

  linux:
    name: Linux (Swift ${{ matrix.swift }})
    strategy:
      matrix:
        swift:
          - '6.1'
    runs-on: ubuntu-latest
    container: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: swift test
      - name: Run tests (all traits)
        run: swift test --enable-all-traits
